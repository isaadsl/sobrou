<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sobrou — Visualize, planeje e economize</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      
      (function () {
        var rotaSalva = sessionStorage.getItem('sobrou:redirecionar_para');
        if (rotaSalva) {
          sessionStorage.removeItem('sobrou:redirecionar_para');
          var caminhoBase = '/sobrou/';
          window.history.replaceState(null, '', caminhoBase + rotaSalva);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
